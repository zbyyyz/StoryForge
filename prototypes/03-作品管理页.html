<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge 原型 - 作品管理页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #fff; color: #111; min-height: 100vh; display: flex; }

/* Sidebar */
.sidebar { width: 280px; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; height: 100vh; position: fixed; left: 0; top: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid #f0f0f0; }
.sidebar-back { font-size: 13px; color: #888; cursor: pointer; margin-bottom: 12px; display: block; }
.sidebar-back:hover { color: #111; }
.sidebar-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sidebar-meta { font-size: 12px; color: #aaa; }

.sidebar-nav { padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.sidebar-nav-item { padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.sidebar-nav-item:hover { background: #f8f8f8; }
.sidebar-nav-item.active { background: #f5f5f5; color: #111; font-weight: 500; }
.sidebar-nav-item svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }

.chapter-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.chapter-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #bbb; padding: 12px 12px 8px; }
.chapter-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
.chapter-item:hover { background: #f8f8f8; }
.chapter-item.active { background: #f0f0f0; }
.chapter-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chapter-status.empty { border: 1.5px solid #ddd; }
.chapter-status.skeleton { background: #fbbf24; }
.chapter-status.expanded { background: #34d399; }
.chapter-status.done { background: #111; }
.chapter-info { flex: 1; min-width: 0; }
.chapter-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chapter-words { font-size: 11px; color: #bbb; }
.chapter-add { padding: 10px 12px; font-size: 13px; color: #aaa; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 6px; }
.chapter-add:hover { background: #f8f8f8; color: #666; }

/* Main content */
.main-content { margin-left: 280px; flex: 1; padding: 40px; max-width: 800px; }

.main-header { margin-bottom: 40px; }
.main-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.main-header p { font-size: 14px; color: #888; }

/* Stats */
.stats-row { display: flex; gap: 24px; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid #f0f0f0; }
.stat-item { }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 12px; color: #aaa; margin-top: 2px; }

/* Progress */
.progress-section { margin-bottom: 40px; }
.progress-section-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.progress-bar-wrap { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 8px; display: flex; }
.progress-bar-fill { height: 100%; }
.progress-legend { display: flex; gap: 16px; font-size: 11px; color: #aaa; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

/* Quick actions */
.quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.action-btn { padding: 10px 18px; border: 1px solid #eee; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.action-btn:hover { border-color: #ccc; background: #fafafa; }
.action-btn svg { width: 14px; height: 14px; stroke: #666; stroke-width: 1.5; fill: none; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-back">← 返回工作台</span>
    <div class="sidebar-title">城市边缘</div>
    <div class="sidebar-meta">现代都市 · 悬疑推理</div>
  </div>

  <div class="sidebar-nav">
    <div class="sidebar-nav-item active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      总览
    </div>
    <div class="sidebar-nav-item">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      角色库
    </div>
    <div class="sidebar-nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      世界观
    </div>
    <div class="sidebar-nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
      风格预设
    </div>
  </div>

  <div class="chapter-section-title">章节</div>
  <div class="chapter-list">
    <div class="chapter-item active">
      <div class="chapter-status done"></div>
      <div class="chapter-info">
        <div class="chapter-name">第一章：深夜订单</div>
        <div class="chapter-words">3,200字</div>
      </div>
    </div>
    <div class="chapter-item">
      <div class="chapter-status done"></div>
      <div class="chapter-info">
        <div class="chapter-name">第二章：目击</div>
        <div class="chapter-words">4,100字</div>
      </div>
    </div>
    <div class="chapter-item">
      <div class="chapter-status expanded"></div>
      <div class="chapter-info">
        <div class="chapter-name">第三章：追杀</div>
        <div class="chapter-words">2,800字</div>
      </div>
    </div>
    <div class="chapter-item">
      <div class="chapter-status skeleton"></div>
      <div class="chapter-info">
        <div class="chapter-name">第四章：线索</div>
        <div class="chapter-words">骨架已写</div>
      </div>
    </div>
    <div class="chapter-item">
      <div class="chapter-status empty"></div>
      <div class="chapter-info">
        <div class="chapter-name">第五章：同盟</div>
        <div class="chapter-words">未开始</div>
      </div>
    </div>
    <div class="chapter-item">
      <div class="chapter-status empty"></div>
      <div class="chapter-info">
        <div class="chapter-name">第六章：真相</div>
        <div class="chapter-words">未开始</div>
      </div>
    </div>
    <div class="chapter-add">+ 新增章节</div>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="main-header">
    <h1>城市边缘</h1>
    <p>一个外卖骑手在送餐途中意外卷入一场城市阴谋</p>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-num">6</div>
      <div class="stat-label">总章节</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">10,100</div>
      <div class="stat-label">总字数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">3</div>
      <div class="stat-label">角色</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">2天前</div>
      <div class="stat-label">最后编辑</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-section-title">创作进度</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:33.3%;background:#111"></div>
      <div class="progress-bar-fill" style="width:16.7%;background:#34d399"></div>
      <div class="progress-bar-fill" style="width:16.7%;background:#fbbf24"></div>
      <div class="progress-bar-fill" style="width:33.3%;background:#e5e5e5"></div>
    </div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:#111"></span>已完成 2章</span>
      <span><span class="legend-dot" style="background:#34d399"></span>已扩写 1章</span>
      <span><span class="legend-dot" style="background:#fbbf24"></span>骨架已写 1章</span>
      <span><span class="legend-dot" style="border:1.5px solid #ddd"></span>未开始 2章</span>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-section-title">快捷操作</div>
    <div class="quick-actions">
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
        继续创作第四章
      </div>
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        管理角色
      </div>
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>
        编辑世界观
      </div>
      <div class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
        导出全文
      </div>
    </div>
  </div>
</div>

</body>
</html>
