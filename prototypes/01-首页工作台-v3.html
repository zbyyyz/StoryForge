<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge 原型 - 首页（主题切换 v3）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; transition: background 0.4s, color 0.4s; }

/* Theme Panel - Bottom drawer */
.theme-drawer { position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); width: 600px; max-width: 90vw; background: #fff; border-radius: 16px 16px 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,0.1); padding: 20px 24px; z-index: 1000; transition: bottom 0.3s ease; border: 1px solid #eee; border-bottom: none; }
.theme-drawer.open { bottom: 0; }
.theme-drawer h3 { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 12px; }
.theme-options { display: flex; gap: 10px; flex-wrap: wrap; }
.theme-btn { padding: 8px 16px; border: 1px solid #eee; border-radius: 20px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.theme-btn:hover { background: #f5f5f5; border-color: #ccc; }
.theme-btn.active { border-color: #111; background: #f0f0f0; font-weight: 600; }
.theme-btn .dot { width: 10px; height: 10px; border-radius: 50%; }
.theme-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 1001; height: 40px; padding: 0 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.theme-toggle:hover { background: #f8f8f8; }

/* Page */
.page-wrap { min-height: 100vh; transition: all 0.4s; }

.header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 24px; }
.nav-link { font-size: 14px; text-decoration: none; cursor: pointer; opacity: 0.6; }
.nav-link:hover { opacity: 1; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

.main { max-width: 1000px; margin: 0 auto; padding: 20px 40px 80px; }

.hero { margin-bottom: 48px; padding: 48px 0; }
.hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
.hero p { font-size: 15px; opacity: 0.5; margin-bottom: 24px; }
.hero-actions { display: flex; gap: 12px; }
.btn-primary { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn-secondary { padding: 10px 24px; background: transparent; border: 1px solid; border-radius: 8px; font-size: 14px; cursor: pointer; opacity: 0.6; }

.section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.section-title .more { font-size: 12px; font-weight: 400; letter-spacing: 0; text-transform: none; cursor: pointer; }

.works-list { margin-bottom: 48px; }
.work-row { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid; border-color: inherit; cursor: pointer; }
.work-row:hover { opacity: 0.8; }
.work-color { width: 4px; height: 40px; border-radius: 2px; margin-right: 16px; }
.work-main { flex: 1; }
.work-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.work-meta { font-size: 12px; opacity: 0.4; }
.work-stats { text-align: right; }
.work-stats-num { font-size: 14px; font-weight: 600; }
.work-stats-label { font-size: 11px; opacity: 0.4; }

.assets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; border-radius: 12px; overflow: hidden; }
.asset-cell { padding: 20px; cursor: pointer; }
.asset-cell:hover { opacity: 0.8; }
.asset-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; margin-bottom: 8px; }
.asset-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.asset-desc { font-size: 12px; opacity: 0.5; line-height: 1.4; }
.asset-meta { margin-top: 10px; font-size: 11px; opacity: 0.3; }

/* ===== THEMES ===== */

/* 晨雾白 (原极简现代) */
body.theme-minimal { background: #fff; color: #111; }
.theme-minimal .logo { color: #111; }
.theme-minimal .avatar { background: #111; color: #fff; }
.theme-minimal .btn-primary { background: #111; color: #fff; }
.theme-minimal .btn-secondary { border-color: #ddd; color: #111; }
.theme-minimal .work-row { border-color: #f5f5f5; }
.theme-minimal .assets-grid { background: #f0f0f0; }
.theme-minimal .asset-cell { background: #fff; }
.theme-minimal .hero { border-bottom: 1px solid #f0f0f0; }

/* 暖陶灰 (原粘土拟态) */
body.theme-clay { background: #e8e4df; color: #3d3832; }
.theme-clay .logo { color: #3d3832; }
.theme-clay .avatar { background: #c9c2b8; color: #5a5249; }
.theme-clay .btn-primary { background: #a89279; color: #fff; border-radius: 16px; box-shadow: 6px 6px 12px #ccc7c1, -6px -6px 12px #fff; }
.theme-clay .btn-secondary { border-color: #ccc7c1; color: #5a5249; border-radius: 16px; box-shadow: 3px 3px 6px #ccc7c1, -3px -3px 6px #fff; }
.theme-clay .work-row { border-color: #d9d4ce; }
.theme-clay .works-list { background: #ece8e3; border-radius: 20px; padding: 8px 20px; box-shadow: inset 3px 3px 6px #d4cfc9, inset -3px -3px 6px #fff; }
.theme-clay .assets-grid { background: #ddd8d2; border-radius: 20px; }
.theme-clay .asset-cell { background: #e8e4df; }
.theme-clay .hero { border-bottom: none; }

/* 荧光终端 (原复古未来主义) */
body.theme-retro { background: #0a0a0f; color: #00ff88; font-family: "Courier New", monospace; }
.theme-retro .header { border-bottom: 1px solid #1a3a2a; }
.theme-retro .logo { color: #00ff88; text-shadow: 0 0 10px #00ff8855; }
.theme-retro .nav-link { color: #00ff88; }
.theme-retro .avatar { background: #00ff88; color: #0a0a0f; }
.theme-retro .btn-primary { background: #00ff88; color: #0a0a0f; font-family: "Courier New", monospace; font-weight: 700; }
.theme-retro .btn-secondary { border-color: #00ff88; color: #00ff88; font-family: "Courier New", monospace; }
.theme-retro .work-row { border-color: #1a3a2a; }
.theme-retro .assets-grid { background: #0f1a14; }
.theme-retro .asset-cell { background: #0a0a0f; border: 1px solid #1a3a2a; }
.theme-retro .hero { border-bottom: 1px solid #1a3a2a; }
.theme-retro .hero h2 { text-shadow: 0 0 20px #00ff8833; }

/* 静夜蓝 (原液态玻璃，重新设计) */
body.theme-glass { background: #1a1a2e; color: rgba(255,255,255,0.85); }
.theme-glass .page-wrap { background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.theme-glass .header { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
.theme-glass .logo { color: rgba(255,255,255,0.9); }
.theme-glass .nav-link { color: rgba(255,255,255,0.5); }
.theme-glass .avatar { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }
.theme-glass .btn-primary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); }
.theme-glass .btn-secondary { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
.theme-glass .work-row { border-color: rgba(255,255,255,0.06); }
.theme-glass .works-list { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 8px 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
.theme-glass .assets-grid { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
.theme-glass .asset-cell { background: rgba(255,255,255,0.03); }
.theme-glass .hero { border-bottom: 1px solid rgba(255,255,255,0.06); }
</style>
</head>
<body class="theme-minimal">

<!-- Theme Toggle Button (bottom-right, no overlap with header) -->
<button class="theme-toggle" onclick="togglePanel()" id="themeToggleBtn">
  <span style="font-size:15px">◐</span> 主题
</button>

<!-- Theme Drawer (bottom center) -->
<div class="theme-drawer" id="themeDrawer">
  <h3>选择主题</h3>
  <div class="theme-options">
    <button class="theme-btn active" onclick="setTheme('minimal', this)">
      <span class="dot" style="background:#111"></span> 晨雾白
    </button>
    <button class="theme-btn" onclick="setTheme('clay', this)">
      <span class="dot" style="background:#a89279"></span> 暖陶灰
    </button>
    <button class="theme-btn" onclick="setTheme('retro', this)">
      <span class="dot" style="background:#00ff88"></span> 荧光终端
    </button>
    <button class="theme-btn" onclick="setTheme('glass', this)">
      <span class="dot" style="background:#16213e"></span> 静夜蓝
    </button>
  </div>
</div>

<!-- Page Content -->
<div class="page-wrap">
  <div class="header">
    <div class="logo">StoryForge</div>
    <div class="header-right">
      <span class="nav-link">资产市场</span>
      <span class="nav-link">我的收藏</span>
      <div class="avatar">N</div>
    </div>
  </div>

  <div class="main">
    <div class="hero">
      <h2>继续你的故事</h2>
      <p>把脑中的画面变成文字，AI为你补齐笔力。</p>
      <div class="hero-actions">
        <button class="btn-primary">新建作品</button>
        <button class="btn-secondary">从模板开始</button>
      </div>
    </div>

    <div class="section-title">最近作品 <span class="more">全部作品</span></div>
    <div class="works-list">
      <div class="work-row">
        <div class="work-color" style="background:#6366f1"></div>
        <div class="work-main">
          <div class="work-title">长安夜雨</div>
          <div class="work-meta">古风仙侠 · 2小时前</div>
        </div>
        <div class="work-stats">
          <div class="work-stats-num">4/10</div>
          <div class="work-stats-label">28k字</div>
        </div>
      </div>
      <div class="work-row">
        <div class="work-color" style="background:#ec4899"></div>
        <div class="work-main">
          <div class="work-title">城市边缘</div>
          <div class="work-meta">现代都市 · 昨天</div>
        </div>
        <div class="work-stats">
          <div class="work-stats-num">9/12</div>
          <div class="work-stats-label">65k字</div>
        </div>
      </div>
      <div class="work-row">
        <div class="work-color" style="background:#06b6d4"></div>
        <div class="work-main">
          <div class="work-title">量子迷途</div>
          <div class="work-meta">科幻未来 · 3天前</div>
        </div>
        <div class="work-stats">
          <div class="work-stats-num">2/15</div>
          <div class="work-stats-label">12k字</div>
        </div>
      </div>
    </div>

    <div class="section-title">推荐资产 <span class="more">浏览全部</span></div>
    <div class="assets-grid">
      <div class="asset-cell">
        <div class="asset-type">世界观</div>
        <div class="asset-name">赛博朋克2099</div>
        <div class="asset-desc">完整赛博朋克设定</div>
        <div class="asset-meta">1.2k 获取</div>
      </div>
      <div class="asset-cell">
        <div class="asset-type">风格预设</div>
        <div class="asset-name">村上春树风</div>
        <div class="asset-desc">孤独感、意识流</div>
        <div class="asset-meta">2.1k 获取</div>
      </div>
      <div class="asset-cell">
        <div class="asset-type">完整包</div>
        <div class="asset-name">修仙世界全套</div>
        <div class="asset-desc">世界观+角色+预设</div>
        <div class="asset-meta">3.5k 获取</div>
      </div>
    </div>
  </div>
</div>

<script>
function togglePanel() {
  document.getElementById('themeDrawer').classList.toggle('open');
}

function setTheme(theme, btn) {
  document.body.className = 'theme-' + theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.addEventListener('click', function(e) {
  const drawer = document.getElementById('themeDrawer');
  const toggle = document.getElementById('themeToggleBtn');
  if (!drawer.contains(e.target) && !toggle.contains(e.target) && drawer.classList.contains('open')) {
    drawer.classList.remove('open');
  }
});
</script>
</body>
</html>
