<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge 原型 - 首页（多主题切换）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; transition: all 0.3s ease; }

/* Theme Switcher Panel */
.theme-panel { position: fixed; top: 0; right: 0; width: 280px; height: 100vh; background: #fff; border-left: 1px solid #eee; padding: 20px; overflow-y: auto; z-index: 1000; box-shadow: -4px 0 20px rgba(0,0,0,0.05); }
.theme-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #333; }
.theme-panel .group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #999; margin: 16px 0 8px; }
.theme-btn { display: block; width: 100%; padding: 10px 12px; margin-bottom: 6px; border: 1px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.15s; }
.theme-btn:hover { background: #f8f8f8; }
.theme-btn.active { border-color: #111; background: #f5f5f5; font-weight: 600; }
.theme-btn .preview-dots { display: flex; gap: 4px; margin-top: 4px; }
.theme-btn .dot { width: 12px; height: 12px; border-radius: 50%; }
.paid-badge { display: inline-block; font-size: 10px; background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

/* Main content area */
.page-wrap { margin-right: 280px; min-height: 100vh; transition: all 0.3s; }

.header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 24px; }
.nav-link { font-size: 14px; text-decoration: none; cursor: pointer; opacity: 0.6; }
.nav-link:hover { opacity: 1; }
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

.main { max-width: 1000px; margin: 0 auto; padding: 20px 40px 60px; }

.hero { margin-bottom: 48px; padding: 48px 0; }
.hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
.hero p { font-size: 15px; opacity: 0.5; margin-bottom: 24px; }
.hero-actions { display: flex; gap: 12px; }
.btn-primary { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn-secondary { padding: 10px 24px; background: transparent; border: 1px solid; border-radius: 8px; font-size: 14px; cursor: pointer; opacity: 0.6; }

.section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.section-title .more { font-size: 12px; font-weight: 400; letter-spacing: 0; text-transform: none; cursor: pointer; }

.works-list { margin-bottom: 48px; }
.work-row { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid; border-color: inherit; cursor: pointer; transition: all 0.15s; }
.work-row:hover { opacity: 0.8; }
.work-color { width: 4px; height: 40px; border-radius: 2px; margin-right: 16px; }
.work-main { flex: 1; }
.work-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.work-meta { font-size: 12px; opacity: 0.4; }
.work-stats { text-align: right; }
.work-stats-num { font-size: 14px; font-weight: 600; }
.work-stats-label { font-size: 11px; opacity: 0.4; }

.assets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; border-radius: 12px; overflow: hidden; }
.asset-cell { padding: 20px; cursor: pointer; transition: all 0.15s; }
.asset-cell:hover { opacity: 0.8; }
.asset-type { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.5; margin-bottom: 8px; }
.asset-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.asset-desc { font-size: 12px; opacity: 0.5; line-height: 1.4; }
.asset-meta { margin-top: 10px; font-size: 11px; opacity: 0.3; }

/* ========== THEMES ========== */

/* 极简现代 (Default) */
body.theme-minimal { background: #fff; color: #111; }
.theme-minimal .header { border-bottom: none; }
.theme-minimal .logo { color: #111; }
.theme-minimal .avatar { background: #111; color: #fff; }
.theme-minimal .btn-primary { background: #111; color: #fff; }
.theme-minimal .btn-secondary { border-color: #ddd; color: #111; }
.theme-minimal .work-row { border-color: #f5f5f5; }
.theme-minimal .work-color:nth-child(1) { background: #6366f1; }
.theme-minimal .assets-grid { background: #f0f0f0; }
.theme-minimal .asset-cell { background: #fff; }
.theme-minimal .hero { border-bottom: 1px solid #f0f0f0; }

/* 粘土拟态 */
body.theme-clay { background: #e8e4df; color: #3d3832; }
.theme-clay .header { background: #e8e4df; }
.theme-clay .logo { color: #3d3832; }
.theme-clay .avatar { background: #c9c2b8; color: #5a5249; }
.theme-clay .btn-primary { background: #a89279; color: #fff; border-radius: 16px; box-shadow: 6px 6px 12px #ccc7c1, -6px -6px 12px #fff; }
.theme-clay .btn-secondary { border-color: #ccc7c1; color: #5a5249; border-radius: 16px; box-shadow: 3px 3px 6px #ccc7c1, -3px -3px 6px #fff; }
.theme-clay .work-row { border-color: #d9d4ce; }
.theme-clay .works-list { background: #ece8e3; border-radius: 20px; padding: 8px 20px; box-shadow: inset 3px 3px 6px #d4cfc9, inset -3px -3px 6px #fff; }
.theme-clay .assets-grid { background: #ddd8d2; border-radius: 20px; }
.theme-clay .asset-cell { background: #e8e4df; }
.theme-clay .hero { border-bottom: none; }

/* 复古未来主义 */
body.theme-retro { background: #0a0a0f; color: #00ff88; font-family: "Courier New", monospace; }
.theme-retro .header { background: #0a0a0f; border-bottom: 1px solid #1a3a2a; }
.theme-retro .logo { color: #00ff88; text-shadow: 0 0 10px #00ff8855; }
.theme-retro .nav-link { color: #00ff88; }
.theme-retro .avatar { background: #00ff88; color: #0a0a0f; }
.theme-retro .btn-primary { background: #00ff88; color: #0a0a0f; font-family: "Courier New", monospace; font-weight: 700; }
.theme-retro .btn-secondary { border-color: #00ff88; color: #00ff88; font-family: "Courier New", monospace; }
.theme-retro .work-row { border-color: #1a3a2a; }
.theme-retro .assets-grid { background: #0f1a14; }
.theme-retro .asset-cell { background: #0a0a0f; border: 1px solid #1a3a2a; }
.theme-retro .hero { border-bottom: 1px solid #1a3a2a; }
.theme-retro .hero h2 { text-shadow: 0 0 20px #00ff8833; }

/* 液态玻璃 */
body.theme-glass { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); color: #fff; min-height: 100vh; }
.theme-glass .page-wrap { background: transparent; }
.theme-glass .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.15); }
.theme-glass .logo { color: #fff; }
.theme-glass .nav-link { color: #fff; }
.theme-glass .avatar { background: rgba(255,255,255,0.2); color: #fff; }
.theme-glass .btn-primary { background: rgba(255,255,255,0.2); color: #fff; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
.theme-glass .btn-secondary { border-color: rgba(255,255,255,0.3); color: #fff; }
.theme-glass .work-row { border-color: rgba(255,255,255,0.1); }
.theme-glass .works-list { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 8px 20px; backdrop-filter: blur(10px); }
.theme-glass .assets-grid { background: rgba(255,255,255,0.05); }
.theme-glass .asset-cell { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
.theme-glass .hero { border-bottom: 1px solid rgba(255,255,255,0.1); }

/* 古风 */
body.theme-gufeng { background: #1c1410; color: #d4b896; font-family: "STKaiti", "KaiTi", serif; }
.theme-gufeng .header { background: #1c1410; border-bottom: 1px solid #3d2e1f; }
.theme-gufeng .logo { color: #d4a04a; }
.theme-gufeng .nav-link { color: #d4b896; }
.theme-gufeng .avatar { background: #3d2e1f; color: #d4a04a; }
.theme-gufeng .btn-primary { background: #8b4513; color: #f5e6d0; border-radius: 4px; }
.theme-gufeng .btn-secondary { border-color: #5c3a1e; color: #d4b896; border-radius: 4px; }
.theme-gufeng .work-row { border-color: #2e2218; }
.theme-gufeng .assets-grid { background: #251c14; }
.theme-gufeng .asset-cell { background: #1c1410; }
.theme-gufeng .hero { border-bottom: 1px solid #3d2e1f; }
.theme-gufeng .hero h2 { color: #d4a04a; }

/* 宫廷 */
body.theme-palace { background: #1a0a1e; color: #e8d0f0; }
.theme-palace .header { background: #1a0a1e; border-bottom: 1px solid #3d1f4a; }
.theme-palace .logo { color: #c9a0dc; }
.theme-palace .nav-link { color: #c9a0dc; }
.theme-palace .avatar { background: #4a1f5c; color: #e8d0f0; }
.theme-palace .btn-primary { background: linear-gradient(135deg, #8b2fc9, #c9a0dc); color: #fff; }
.theme-palace .btn-secondary { border-color: #5c2d6e; color: #c9a0dc; }
.theme-palace .work-row { border-color: #2e1538; }
.theme-palace .assets-grid { background: #220e28; }
.theme-palace .asset-cell { background: #1a0a1e; }
.theme-palace .hero { border-bottom: 1px solid #3d1f4a; }
.theme-palace .hero h2 { color: #dbb8ef; }

/* 江湖 */
body.theme-jianghu { background: #0f1419; color: #b8c5d4; }
.theme-jianghu .header { background: #0f1419; border-bottom: 1px solid #1e2a36; }
.theme-jianghu .logo { color: #5ba3d9; }
.theme-jianghu .nav-link { color: #7ab0d4; }
.theme-jianghu .avatar { background: #1e3a5f; color: #7ab0d4; }
.theme-jianghu .btn-primary { background: #1e3a5f; color: #b8d4ef; border: 1px solid #2a5080; }
.theme-jianghu .btn-secondary { border-color: #2a3a4a; color: #7ab0d4; }
.theme-jianghu .work-row { border-color: #1a2530; }
.theme-jianghu .assets-grid { background: #131c24; }
.theme-jianghu .asset-cell { background: #0f1419; }
.theme-jianghu .hero { border-bottom: 1px solid #1e2a36; }
.theme-jianghu .hero h2 { color: #7ab0d4; }

/* 西欧 */
body.theme-europe { background: #f8f5f0; color: #2c2416; font-family: "Georgia", serif; }
.theme-europe .header { background: #f8f5f0; border-bottom: 1px solid #e0d8cc; }
.theme-europe .logo { color: #6b3a2a; }
.theme-europe .nav-link { color: #6b3a2a; }
.theme-europe .avatar { background: #6b3a2a; color: #f8f5f0; }
.theme-europe .btn-primary { background: #6b3a2a; color: #f8f5f0; }
.theme-europe .btn-secondary { border-color: #c4b8a8; color: #6b3a2a; }
.theme-europe .work-row { border-color: #e8e0d4; }
.theme-europe .assets-grid { background: #ece4d8; }
.theme-europe .asset-cell { background: #f8f5f0; }
.theme-europe .hero { border-bottom: 1px solid #e0d8cc; }
.theme-europe .hero h2 { color: #4a2818; }

/* 都市 */
body.theme-city { background: #111318; color: #e0e4ea; }
.theme-city .header { background: #111318; border-bottom: 1px solid #22262e; }
.theme-city .logo { color: #fff; }
.theme-city .nav-link { color: #8890a0; }
.theme-city .avatar { background: #ff6b35; color: #fff; }
.theme-city .btn-primary { background: #ff6b35; color: #fff; }
.theme-city .btn-secondary { border-color: #333840; color: #8890a0; }
.theme-city .work-row { border-color: #1e2228; }
.theme-city .assets-grid { background: #181c22; }
.theme-city .asset-cell { background: #111318; }
.theme-city .hero { border-bottom: 1px solid #22262e; }
.theme-city .hero h2 { color: #fff; }

/* 校园 */
body.theme-campus { background: #f0f7ff; color: #2a3a50; }
.theme-campus .header { background: #f0f7ff; border-bottom: 1px solid #d4e6f7; }
.theme-campus .logo { color: #2a6cb8; }
.theme-campus .nav-link { color: #5a8ab8; }
.theme-campus .avatar { background: #2a6cb8; color: #fff; }
.theme-campus .btn-primary { background: #2a6cb8; color: #fff; border-radius: 20px; }
.theme-campus .btn-secondary { border-color: #b8d4ef; color: #2a6cb8; border-radius: 20px; }
.theme-campus .work-row { border-color: #e0eef8; }
.theme-campus .assets-grid { background: #e4f0fa; }
.theme-campus .asset-cell { background: #f0f7ff; }
.theme-campus .hero { border-bottom: 1px solid #d4e6f7; }

/* 未来 */
body.theme-future { background: #050510; color: #a0e0ff; }
.theme-future .header { background: #050510; border-bottom: 1px solid #0a2040; }
.theme-future .logo { color: #00d4ff; text-shadow: 0 0 15px #00d4ff44; }
.theme-future .nav-link { color: #60b0d0; }
.theme-future .avatar { background: #00d4ff; color: #050510; }
.theme-future .btn-primary { background: linear-gradient(135deg, #00d4ff, #7b2ff7); color: #fff; }
.theme-future .btn-secondary { border-color: #0a3060; color: #60b0d0; }
.theme-future .work-row { border-color: #0a1a2a; }
.theme-future .assets-grid { background: #080818; }
.theme-future .asset-cell { background: #050510; border: 1px solid #0a2040; }
.theme-future .hero { border-bottom: 1px solid #0a2040; }
.theme-future .hero h2 { color: #00d4ff; text-shadow: 0 0 30px #00d4ff22; }
</style>
</head>
<body class="theme-minimal">

<!-- Theme Switcher -->
<div class="theme-panel">
  <h3>主题切换预览</h3>

  <div class="group-label">基础配色（免费）</div>
  <button class="theme-btn active" onclick="setTheme('minimal', this)">
    极简现代
    <div class="preview-dots"><div class="dot" style="background:#111"></div><div class="dot" style="background:#fff"></div><div class="dot" style="background:#f0f0f0"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('clay', this)">
    粘土拟态
    <div class="preview-dots"><div class="dot" style="background:#e8e4df"></div><div class="dot" style="background:#a89279"></div><div class="dot" style="background:#ccc7c1"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('retro', this)">
    复古未来主义
    <div class="preview-dots"><div class="dot" style="background:#0a0a0f"></div><div class="dot" style="background:#00ff88"></div><div class="dot" style="background:#1a3a2a"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('glass', this)">
    液态玻璃
    <div class="preview-dots"><div class="dot" style="background:#667eea"></div><div class="dot" style="background:#764ba2"></div><div class="dot" style="background:#f093fb"></div></div>
  </button>

  <div class="group-label">沉浸式配色（付费）<span class="paid-badge">PRO</span></div>
  <button class="theme-btn" onclick="setTheme('gufeng', this)">
    古风
    <div class="preview-dots"><div class="dot" style="background:#1c1410"></div><div class="dot" style="background:#d4a04a"></div><div class="dot" style="background:#8b4513"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('palace', this)">
    宫廷
    <div class="preview-dots"><div class="dot" style="background:#1a0a1e"></div><div class="dot" style="background:#c9a0dc"></div><div class="dot" style="background:#8b2fc9"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('jianghu', this)">
    江湖
    <div class="preview-dots"><div class="dot" style="background:#0f1419"></div><div class="dot" style="background:#5ba3d9"></div><div class="dot" style="background:#1e3a5f"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('europe', this)">
    西欧
    <div class="preview-dots"><div class="dot" style="background:#f8f5f0"></div><div class="dot" style="background:#6b3a2a"></div><div class="dot" style="background:#e0d8cc"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('city', this)">
    都市
    <div class="preview-dots"><div class="dot" style="background:#111318"></div><div class="dot" style="background:#ff6b35"></div><div class="dot" style="background:#22262e"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('campus', this)">
    校园
    <div class="preview-dots"><div class="dot" style="background:#f0f7ff"></div><div class="dot" style="background:#2a6cb8"></div><div class="dot" style="background:#d4e6f7"></div></div>
  </button>
  <button class="theme-btn" onclick="setTheme('future', this)">
    未来
    <div class="preview-dots"><div class="dot" style="background:#050510"></div><div class="dot" style="background:#00d4ff"></div><div class="dot" style="background:#7b2ff7"></div></div>
  </button>
</div>

<!-- Page Content -->

    <div class="section-title">推荐资产 <span class="more">浏览全部</span></div>

        <div class="asset-meta">3.5k 获取</div>
      </div>
    </div>
  </div>
</div>

<script>
function setTheme(theme, btn) {
  document.body.className = 'theme-' + theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
